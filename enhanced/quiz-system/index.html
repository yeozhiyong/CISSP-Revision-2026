<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISSP Quiz System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; padding: 40px 20px; }
        .header h1 { font-size: 42px; color: #00d4ff; margin-bottom: 10px; }
        .header p { color: #888; font-size: 18px; }
        
        .quiz-options {
            display: grid;
            gap: 20px;
            margin-top: 40px;
        }
        .quiz-card {
            background: #16213e;
            border-radius: 15px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .quiz-card:hover { border-color: #00d4ff; transform: translateX(10px); }
        .quiz-info h2 { color: #00d4ff; margin-bottom: 5px; }
        .quiz-info p { color: #888; }
        .btn-launch {
            background: #00d4ff;
            color: #1a1a2e;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 40px;
            color: #00d4ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 CISSP Quiz System</h1>
            <p>Advanced Practice with Adaptive Learning</p>
        </div>
        
        <div class="quiz-options">
            <a href="adaptive-quiz.html" class="quiz-card">
                <div class="quiz-info">
                    <h2>🎯 Adaptive Quiz</h2>
                    <p>Personalized questions based on your weak areas</p>
                </div>
                <span class="btn-launch">Launch →</span>
            </a>
            
            <a href="../practice-tests/" class="quiz-card">
                <div class="quiz-info">
                    <h2>📚 Standard Practice</h2>
                    <p>Domain-specific and full exam simulations</p>
                </div>
                <span class="btn-launch">Launch →</span>
            </a>
            
            <a href="../flashcards/" class="quiz-card">
                <div class="quiz-info">
                    <h2>🎴 Flashcards</h2>
                    <p>Quick review and memorization</p>
                </div>
                <span class="btn-launch">Launch →</span>
            </a>
        </div>
        
        <a href="../" class="back-link">← Back to Study Hub</a>
    </div>
</body>
</html>
