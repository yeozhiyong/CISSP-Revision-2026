<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain 1 Flashcards - Security & Risk Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 20px;
        }
        .header h1 { color: #00d4ff; font-size: 32px; margin-bottom: 10px; }
        .header p { color: #888; }
        .progress {
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
            color: #00d4ff;
        }
        .flashcard-container {
            max-width: 600px;
            margin: 0 auto;
            perspective: 1000px;
        }
        .flashcard {
            background: #16213e;
            border-radius: 20px;
            padding: 40px;
            min-height: 300px;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border: 2px solid #0f3460;
            position: relative;
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .flashcard-face {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        .card-label {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #00d4ff;
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .card-front-text {
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
        }
        .card-back-text {
            font-size: 20px;
            line-height: 1.6;
        }
        .hint {
            position: absolute;
            bottom: 20px;
            color: #666;
            font-size: 14px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .btn {
            background: #0f3460;
            border: none;
            color: #eee;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .btn:hover { background: #1a4a7a; }
        .btn-primary { background: #00d4ff; color: #1a1a2e; }
        .btn-primary:hover { background: #33ddff; }
        .navigation {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .nav-btn {
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
        }
        .shuffle-btn {
            background: #0f3460;
            border: none;
            color: #888;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .flashcard { min-height: 250px; padding: 30px; }
            .card-front-text { font-size: 22px; }
            .card-back-text { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎴 Domain 1 Flashcards</h1>
        <p>Security and Risk Management (16% of exam)</p>
    </div>
    
    <div class="progress">
        Card <span id="current">1</span> of <span id="total">16</span>
    </div>
    
    <div class="flashcard-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="flashcard-face flashcard-front">
                <span class="card-label">FRONT</span>
                <div class="card-front-text" id="front-text">Loading...</div>
                <span class="hint">Click to flip</span>
            </div>
            <div class="flashcard-face flashcard-back">
                <span class="card-label">BACK</span>
                <div class="card-back-text" id="back-text">Loading...</div>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="prevCard()">← Previous</button>
        <button class="btn btn-primary" onclick="nextCard()">Next →</button>
    </div>
    
    <div class="navigation">
        <button class="nav-btn" onclick="shuffleCards()">🔀 Shuffle</button>
        <button class="nav-btn" onclick="resetCards()">↺ Reset</button>
    </div>

    <script>
        const flashcards = [
            { front: "Confidentiality", back: "Prevent unauthorized <strong>disclosure</strong><br><br>Controls: Encryption, access controls, authentication" },
            { front: "Integrity", back: "Prevent unauthorized <strong>modification</strong><br><br>Controls: Hashing, digital signatures, version control" },
            { front: "Availability", back: "Ensure <strong>timely, reliable access</strong><br><br>Controls: Redundancy, backups, failover, RAID" },
            { front: "Policy", back: "<strong>High-level</strong>, strategic<br>Approved by senior management<br><br>Example: 'We protect customer data'" },
            { front: "Standard", back: "<strong>Specific, mandatory</strong> requirements<br><br>Example: 'Passwords must be 12+ characters'" },
            { front: "Procedure", back: "<strong>Step-by-step</strong> instructions<br><br>Example: 'How to reset a password'" },
            { front: "Guideline", back: "<strong>Optional</strong> recommendations<br>Best practices<br><br>Not mandatory" },
            { front: "Risk Formula", back: "<strong>Risk = Threat × Vulnerability × Impact</strong><br><br>Or: Risk = Likelihood × Impact" },
            { front: "SLE", back: "<strong>Single Loss Expectancy</strong><br><br>SLE = Asset Value × EF (Exposure Factor)" },
            { front: "ALE", back: "<strong>Annual Loss Expectancy</strong><br><br>ALE = SLE × ARO<br><br>Expected loss per year" },
            { front: "ARO", back: "<strong>Annualized Rate of Occurrence</strong><br><br>How many times per year the event is expected to occur" },
            { front: "Risk Avoidance", back: "<strong>Eliminate</strong> the risk<br><br>Stop the activity that creates the risk" },
            { front: "Risk Mitigation", back: "<strong>Reduce</strong> likelihood/impact<br><br>Implement controls, training, monitoring" },
            { front: "Risk Transfer", back: "<strong>Shift</strong> financial impact<br><br>Insurance, outsourcing, contracts" },
            { front: "Risk Acceptance", back: "<strong>Do nothing</strong>, absorb cost<br><br>When mitigation cost > risk cost" },
            { front: "Due Care vs Due Diligence", back: "<strong>Due Care:</strong> Taking reasonable steps (action)<br><br><strong>Due Diligence:</strong> Continuous monitoring (ongoing)" }
        ];
        
        let currentIndex = 0;
        let shuffled = [...flashcards];
        
        function updateCard() {
            document.getElementById('front-text').innerHTML = shuffled[currentIndex].front;
            document.getElementById('back-text').innerHTML = shuffled[currentIndex].back;
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('total').textContent = shuffled.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }
        
        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }
        
        function nextCard() {
            currentIndex = (currentIndex + 1) % shuffled.length;
            updateCard();
        }
        
        function prevCard() {
            currentIndex = (currentIndex - 1 + shuffled.length) % shuffled.length;
            updateCard();
        }
        
        function shuffleCards() {
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            currentIndex = 0;
            updateCard();
        }
        
        function resetCards() {
            shuffled = [...flashcards];
            currentIndex = 0;
            updateCard();
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') flipCard();
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
        });
        
        updateCard();
    </script>
</body>
</html>
