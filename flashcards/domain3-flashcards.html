<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain 3 Flashcards - Security Architecture & Engineering</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 20px;
        }
        .header h1 { color: #00d4ff; font-size: 32px; margin-bottom: 10px; }
        .header p { color: #888; }
        .progress {
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
            color: #00d4ff;
        }
        .flashcard-container {
            max-width: 600px;
            margin: 0 auto;
            perspective: 1000px;
        }
        .flashcard {
            background: #16213e;
            border-radius: 20px;
            padding: 40px;
            min-height: 300px;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border: 2px solid #0f3460;
            position: relative;
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .flashcard-face {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        .card-label {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #00d4ff;
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .card-front-text {
            font-size: 26px;
            font-weight: bold;
            color: #00d4ff;
        }
        .card-back-text {
            font-size: 18px;
            line-height: 1.6;
        }
        .hint {
            position: absolute;
            bottom: 20px;
            color: #666;
            font-size: 14px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .btn {
            background: #0f3460;
            border: none;
            color: #eee;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .btn:hover { background: #1a4a7a; }
        .btn-primary { background: #00d4ff; color: #1a1a2e; }
        .btn-primary:hover { background: #33ddff; }
        .navigation {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .nav-btn {
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .flashcard { min-height: 250px; padding: 30px; }
            .card-front-text { font-size: 22px; }
            .card-back-text { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎴 Domain 3 Flashcards</h1>
        <p>Security Architecture & Engineering (13% of exam)</p>
    </div>
    
    <div class="progress">
        Card <span id="current">1</span> of <span id="total">20</span>
    </div>
    
    <div class="flashcard-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="flashcard-face flashcard-front">
                <span class="card-label">FRONT</span>
                <div class="card-front-text" id="front-text">Loading...</div>
                <span class="hint">Click to flip</span>
            </div>
            <div class="flashcard-face flashcard-back">
                <span class="card-label">BACK</span>
                <div class="card-back-text" id="back-text">Loading...</div>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="prevCard()">← Previous</button>
        <button class="btn btn-primary" onclick="nextCard()">Next →</button>
    </div>
    
    <div class="navigation">
        <button class="nav-btn" onclick="shuffleCards()">🔀 Shuffle</button>
        <button class="nav-btn" onclick="resetCards()">↺ Reset</button>
    </div>

    <script>
        const flashcards = [
            // Security Models
            { front: "Bell-LaPadula", back: "<strong>Confidentiality model</strong><br><br>No Read Up<br>No Write Down<br><br>Use: Military, Government" },
            { front: "Biba Model", back: "<strong>Integrity model</strong><br><br>No Read Down<br>No Write Up<br><br>Opposite of Bell-LaPadula" },
            { front: "Clark-Wilson", back: "<strong>Commercial Integrity</strong><br><br>Well-formed transactions<br>Separation of duties<br><br>Use: Banking, ERP" },
            { front: "Brewer-Nash", back: "<strong>Chinese Wall</strong><br><br>Prevents conflict of interest<br>Can't access competing clients<br><br>Use: Consulting" },
            
            // Access Control Models
            { front: "MAC", back: "<strong>Mandatory Access Control</strong><br><br>System-enforced<br>Security labels (Top Secret, Secret)<br>Users CANNOT change permissions<br><br>Use: Military" },
            { front: "DAC", back: "<strong>Discretionary Access Control</strong><br><br>Owner decides access<br>ACLs, Permission lists<br>Users CAN change permissions<br><br>Use: Windows, Linux file systems" },
            { front: "RBAC", back: "<strong>Role-Based Access Control</strong><br><br>Access based on JOB ROLE<br>Admin, User, Manager roles<br>Permissions assigned to roles<br><br>Use: Enterprises" },
            { front: "ABAC", back: "<strong>Attribute-Based Access Control</strong><br><br>Access based on ATTRIBUTES<br>User, Resource, Environment attributes<br>Dynamic, context-aware<br><br>Use: Cloud, Modern systems" },
            
            // Cryptography Basics
            { front: "Symmetric Encryption", back: "<strong>Same key</strong> for encrypt/decrypt<br><br>Fast, efficient<br>Key distribution problem<br><br>Examples: AES, 3DES, Blowfish" },
            { front: "Asymmetric Encryption", back: "<strong>Key pair</strong>: Public + Private<br><br>Public encrypts, Private decrypts<br>Slower than symmetric<br><br>Examples: RSA, ECC, Diffie-Hellman" },
            { front: "Hashing", back: "<strong>One-way function</strong><br><br>Fixed output size<br>Cannot reverse<br>Detects integrity violations<br><br>Examples: SHA-256, MD5 (broken)" },
            { front: "Digital Signature", back: "<strong>Proves authenticity + integrity</strong><br><br>Hash encrypted with private key<br>Verified with public key<br>Non-repudiation" },
            
            // PKI
            { front: "Certificate Authority (CA)", back: "<strong>Trusted third party</strong><br><br>Issues digital certificates<br>Binds public key to identity<br>Root of trust" },
            { front: "Public Key Infrastructure", back: "<strong>System for managing keys</strong><br><br>CAs, Certificates, CRLs<br>Enables secure communication<br>Trust hierarchy" },
            { front: "Certificate Revocation List", back: "<strong>List of revoked certificates</strong><br><br>Published by CA<br>Check before trusting cert<br>Alternative: OCSP (Online)" },
            
            // Secure Architecture
            { front: "Trusted Computing Base (TCB)", back: "<strong>All hardware, software, firmware</strong><br>that enforces security policy<br><br>Kernel, security kernel<br>Must be small and verifiable" },
            { front: "Security Kernel", back: "<strong>Core of TCB</strong><br><br>Mediates all access<br>Reference monitor concept<br>Must be: Complete, Isolated, Verifiable" },
            { front: "Reference Monitor", back: "<strong>Abstract security concept</strong><br><br>Mediates all subject-object access<br>Cannot be bypassed<br>Tamper-proof, always invoked" },
            
            // Cloud Security
            { front: "IaaS", back: "<strong>Infrastructure as a Service</strong><br><br>Provider: Physical, Network, Virtualization<br>Customer: OS, Apps, Data<br><br>Examples: AWS EC2, Azure VMs" },
            { front: "PaaS", back: "<strong>Platform as a Service</strong><br><br>Provider: +OS, Middleware, Runtime<br>Customer: Apps, Data<br><br>Examples: Heroku, Google App Engine" },
            { front: "SaaS", back: "<strong>Software as a Service</strong><br><br>Provider: Everything<br>Customer: Just data<br><br>Examples: Gmail, Salesforce, Office 365" }
        ];
        
        let currentIndex = 0;
        let shuffled = [...flashcards];
        
        function updateCard() {
            document.getElementById('front-text').innerHTML = shuffled[currentIndex].front;
            document.getElementById('back-text').innerHTML = shuffled[currentIndex].back;
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('total').textContent = shuffled.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }
        
        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }
        
        function nextCard() {
            currentIndex = (currentIndex + 1) % shuffled.length;
            updateCard();
        }
        
        function prevCard() {
            currentIndex = (currentIndex - 1 + shuffled.length) % shuffled.length;
            updateCard();
        }
        
        function shuffleCards() {
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            currentIndex = 0;
            updateCard();
        }
        
        function resetCards() {
            shuffled = [...flashcards];
            currentIndex = 0;
            updateCard();
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') flipCard();
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
        });
        
        updateCard();
    </script>
</body>
</html>
