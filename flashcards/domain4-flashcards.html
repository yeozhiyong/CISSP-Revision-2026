<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain 4 Flashcards - Communication & Network Security</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .header { text-align: center; padding: 30px 20px; }
        .header h1 { color: #00d4ff; font-size: 32px; margin-bottom: 10px; }
        .header p { color: #888; }
        .progress { text-align: center; margin-bottom: 30px; font-size: 18px; color: #00d4ff; }
        .flashcard-container { max-width: 600px; margin: 0 auto; perspective: 1000px; }
        .flashcard {
            background: #16213e;
            border-radius: 20px;
            padding: 40px;
            min-height: 300px;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border: 2px solid #0f3460;
            position: relative;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face {
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .flashcard-back { transform: rotateY(180deg); }
        .card-label { position: absolute; top: 20px; left: 20px; background: #00d4ff; color: #1a1a2e; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .card-front-text { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .card-back-text { font-size: 20px; line-height: 1.6; }
        .hint { position: absolute; bottom: 20px; color: #666; font-size: 14px; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .btn { background: #0f3460; border: none; color: #eee; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #1a4a7a; }
        .btn-primary { background: #00d4ff; color: #1a1a2e; }
        .navigation { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav-btn { background: transparent; border: 2px solid #00d4ff; color: #00d4ff; padding: 10px 25px; border-radius: 8px; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 40px; color: #00d4ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎴 Domain 4 Flashcards</h1>
        <p>Communication and Network Security (13% of exam)</p>
    </div>
    <div class="progress">Card <span id="current">1</span> of <span id="total">15</span></div>
    <div class="flashcard-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="flashcard-face flashcard-front">
                <span class="card-label">FRONT</span>
                <div class="card-front-text" id="front-text">Loading...</div>
                <span class="hint">Click to flip</span>
            </div>
            <div class="flashcard-face flashcard-back">
                <span class="card-label">BACK</span>
                <div class="card-back-text" id="back-text">Loading...</div>
            </div>
        </div>
    </div>
    <div class="controls">
        <button class="btn" onclick="prevCard()">← Previous</button>
        <button class="btn btn-primary" onclick="nextCard()">Next →</button>
    </div>
    <div class="navigation">
        <button class="nav-btn" onclick="shuffleCards()">🔀 Shuffle</button>
        <button class="nav-btn" onclick="resetCards()">↺ Reset</button>
    </div>
    <a href="index.html" class="back-link">← Back to Flashcards</a>

    <script>
        const flashcards = [
            { front: "OSI Model - Layer 1", back: "<strong>Physical Layer</strong><br><br>Cables, connectors, electrical signals<br>Hubs, repeaters<br><br>Bits transmission" },
            { front: "OSI Model - Layer 2", back: "<strong>Data Link Layer</strong><br><br>MAC addresses, frames<br>Switches, bridges<br><br>Error detection (CRC)" },
            { front: "OSI Model - Layer 3", back: "<strong>Network Layer</strong><br><br>IP addresses, packets<br>Routers<br><br>Routing, logical addressing" },
            { front: "OSI Model - Layer 4", back: "<strong>Transport Layer</strong><br><br>TCP, UDP<br>Port numbers<br><br>Reliable delivery, flow control" },
            { front: "OSI Model - Layer 7", back: "<strong>Application Layer</strong><br><br>HTTP, FTP, SMTP<br>User interfaces<br><br>End-user services" },
            { front: "TCP vs UDP", back: "<strong>TCP:</strong> Connection-oriented, reliable, ordered<br>HTTP, FTP, SSH<br><br><strong>UDP:</strong> Connectionless, fast, unreliable<br>DNS, VoIP, streaming" },
            { front: "Firewall Types", back: "<strong>Packet Filter:</strong> Layer 3/4, fast, basic<br><strong>Stateful:</strong> Tracks connections<br><strong>Proxy:</strong> Layer 7, application-aware<br><strong>NGFW:</strong> Deep packet inspection" },
            { front: "VPN Types", back: "<strong>Site-to-Site:</strong> Connects networks<br><strong>Remote Access:</strong> Individual users<br><br>Protocols: IPsec, SSL/TLS, L2TP" },
            { front: "IPsec Modes", back: "<strong>Transport Mode:</strong> Encrypts payload only<br><strong>Tunnel Mode:</strong> Encrypts entire packet<br><br>AH (authentication) + ESP (encryption)" },
            { front: "SSL/TLS", back: "<strong>Secure Sockets Layer / Transport Layer Security</strong><br><br>Encrypts web traffic (HTTPS)<br>Port 443<br>Certificates for authentication" },
            { front: "DNS", back: "<strong>Domain Name System</strong><br><br>Translates domain names to IP addresses<br>Port 53<br>Critical infrastructure target" },
            { front: "Subnetting", back: "<strong>Dividing network into smaller networks</strong><br><br>Improves security and performance<br>Reduces broadcast domain<br>CIDR notation (/24, /16)" },
            { front: "VLAN", back: "<strong>Virtual LAN</strong><br><br>Logical network segmentation<br>Same switch, different networks<br>Improves security and organization" },
            { front: "NAT", back: "<strong>Network Address Translation</strong><br><br>Private IP ↔ Public IP<br>Hides internal network structure<br>Conserves IPv4 addresses" },
            { front: "Common Network Attacks", back: "<strong>MITM:</strong> Intercept communication<br><strong>DoS/DDoS:</strong> Deny service<br><strong>Spoofing:</strong> Fake identity<br><strong>Sniffing:</strong> Capture traffic" }
        ];
        let currentIndex = 0;
        let shuffled = [...flashcards];
        function updateCard() {
            document.getElementById('front-text').innerHTML = shuffled[currentIndex].front;
            document.getElementById('back-text').innerHTML = shuffled[currentIndex].back;
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('total').textContent = shuffled.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }
        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }
        function nextCard() { currentIndex = (currentIndex + 1) % shuffled.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + shuffled.length) % shuffled.length; updateCard(); }
        function shuffleCards() { for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; } currentIndex = 0; updateCard(); }
        function resetCards() { shuffled = [...flashcards]; currentIndex = 0; updateCard(); }
        document.addEventListener('keydown', (e) => { if (e.key === ' ') flipCard(); if (e.key === 'ArrowRight') nextCard(); if (e.key === 'ArrowLeft') prevCard(); });
        updateCard();
    </script>
</body>
</html>
