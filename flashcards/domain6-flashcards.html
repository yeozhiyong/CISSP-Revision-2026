<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain 6 Flashcards - Security Assessment and Testing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .header { text-align: center; padding: 30px 20px; }
        .header h1 { color: #00d4ff; font-size: 32px; margin-bottom: 10px; }
        .header p { color: #888; }
        .progress { text-align: center; margin-bottom: 30px; font-size: 18px; color: #00d4ff; }
        .flashcard-container { max-width: 600px; margin: 0 auto; perspective: 1000px; }
        .flashcard {
            background: #16213e;
            border-radius: 20px;
            padding: 40px;
            min-height: 300px;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border: 2px solid #0f3460;
            position: relative;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face {
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .flashcard-back { transform: rotateY(180deg); }
        .card-label { position: absolute; top: 20px; left: 20px; background: #00d4ff; color: #1a1a2e; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .card-front-text { font-size: 28px; font-weight: bold; color: #00d4ff; }
        .card-back-text { font-size: 20px; line-height: 1.6; }
        .hint { position: absolute; bottom: 20px; color: #666; font-size: 14px; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .btn { background: #0f3460; border: none; color: #eee; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #1a4a7a; }
        .btn-primary { background: #00d4ff; color: #1a1a2e; }
        .navigation { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav-btn { background: transparent; border: 2px solid #00d4ff; color: #00d4ff; padding: 10px 25px; border-radius: 8px; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 40px; color: #00d4ff; text-decoration: none; }
        .placeholder { background: #1a3a5c; padding: 30px; border-radius: 15px; text-align: center; margin: 40px auto; max-width: 500px; }
        .placeholder h3 { color: #ffd700; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎴 Domain 6 Flashcards</h1>
        <p>Security Assessment and Testing (12% of exam)</p>
    </div>
    
    <div class="placeholder">
        <h3>🚧 Coming Soon</h3>
        <p>Flashcards for Domain 6 are being created.</p>
        <p style="margin-top: 15px; color: #888;">Check back soon for interactive study cards!</p>
    </div>
    
    <a href="index.html" class="back-link">← Back to Flashcards</a>
</body>
</html>
